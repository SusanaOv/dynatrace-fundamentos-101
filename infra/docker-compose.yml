services:
  demo-web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./demo-web/html:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 3

  demo-api:
    build:
      context: ./demo-web
      dockerfile: Dockerfile.api
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://lab:lab@postgres:5432/lab
      REDIS_URL: redis://redis:6379/0
      DYNATRACE_ENVIRONMENT_URL: ${DYNATRACE_ENVIRONMENT_URL:-}
      DYNATRACE_INGEST_TOKEN: ${DYNATRACE_INGEST_TOKEN:-}
      OTEL_SERVICE_NAME: demo-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: lab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  loadgen:
    image: curlimages/curl:8.12.1
    depends_on:
      demo-web:
        condition: service_healthy
      demo-api:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          curl -sf http://demo-web:80/ >/dev/null || true
          curl -sf http://demo-api:8081/health >/dev/null || true
          curl -sf http://demo-api:8081/work >/dev/null || true
          sleep 3
        done
