apiVersion: v1
kind: Namespace
metadata:
  name: dynatrace-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-web
  namespace: dynatrace-lab
  labels:
    app: lab-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab-web
  template:
    metadata:
      labels:
        app: lab-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: lab-web
  namespace: dynatrace-lab
spec:
  selector:
    app: lab-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-loadgen
  namespace: dynatrace-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-loadgen
  template:
    metadata:
      labels:
        app: lab-loadgen
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.12.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                curl -sf http://lab-web/ >/dev/null || true
                sleep 2
              done
